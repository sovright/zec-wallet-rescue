name: GitHub Actions security (zizmor)

# Runs zizmor (https://github.com/zizmorcore/zizmor) on our workflow files
# to catch the classic Actions-supply-chain misconfigurations: overly broad
# `permissions:` blocks, `persist-credentials: true` on checkout, command
# injection via untrusted GitHub event payloads, etc. Matches the pattern
# used by librustzcash and zcash-swift-wallet-sdk (THREAT_MODEL.md §6.6 T-SC1b).

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["**"]

permissions: {}

jobs:
  zizmor:
    name: Run zizmor
    runs-on: ubuntu-latest
    permissions:
      contents: read
      # Required for upload-sarif (used by zizmor-action) to publish results
      # to the GitHub Security tab.
      security-events: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Run zizmor
        uses: zizmorcore/zizmor-action@5f14fd08f7cf1cb1609c1e344975f152c7ee938d # v0.5.6
