name: release

on:
  push:
    tags:
      - "v*"

# Least-privilege default: every job opts in explicitly. Only the publish
# job needs `contents: write` (to create the GitHub Release); the provenance
# job additionally needs `id-token: write` to obtain an OIDC token for
# Sigstore signing of the in-toto attestation. Mitigates third-party Action
# token-exfiltration risk (THREAT_MODEL.md §6.6 T-SC3).
permissions: {}

jobs:
  build-linux:
    runs-on: ubuntu-22.04
    permissions:
      contents: read
    outputs:
      # Base64-encoded list of "<sha256>  <filename>" lines for this job's
      # artifacts. Consumed by the `combine-hashes` job and ultimately by
      # the SLSA generic generator (T-SC6).
      hashes: ${{ steps.hash.outputs.hashes }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Install Rust 1.87
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master@2026-05-27
        with:
          toolchain: "1.87"

      # No Swatinem/rust-cache in release builds: a poisoned cache from a PR
      # run feeding a signed release tag is a worse failure mode than a slow
      # tag build (THREAT_MODEL.md §6.6 T-SC3 / zizmor cache-poisoning).

      - name: Install Linux system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install Node (for Tauri CLI)
        # zizmor: ignore[cache-poisoning]
        # setup-node is required to install the Tauri CLI. We pass `cache: ""`
        # so no npm/yarn/pnpm cache is read or written at runtime; zizmor's
        # static rule flags setup-node regardless because the action *can*
        # cache when `cache:` is set to a package-manager string. Suppressed
        # on the explicit `cache: ""` opt-out below.
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 24
          cache: ""

      - name: Install Tauri CLI
        run: npm install -g @tauri-apps/cli@2.11.1

      - name: Build Tauri app
        working-directory: gui
        run: tauri build --bundles deb --bundles appimage

      - name: Compute artifact hashes
        id: hash
        shell: bash
        working-directory: target/release/bundle
        run: |
          set -euo pipefail
          sha256sum deb/*.deb appimage/*.AppImage > hashes-linux.txt
          echo "hashes=$(base64 -w0 < hashes-linux.txt)" >> "$GITHUB_OUTPUT"

      - name: Upload artifacts (Linux)
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: zeck-linux
          path: |
            target/release/bundle/deb/*.deb
            target/release/bundle/appimage/*.AppImage

  build-macos:
    strategy:
      fail-fast: false
      matrix:
        target: [aarch64-apple-darwin, x86_64-apple-darwin]
    runs-on: macos-latest
    environment: release-sign
    permissions:
      contents: read
    # Per-matrix-instance outputs: GitHub Actions surfaces only the last
    # successful instance's `outputs:` block, so we cannot return both
    # targets' hashes through job-level outputs. Each instance therefore
    # uploads a `hashes-macos-<target>` workflow artifact instead; the
    # `combine-hashes` job downloads them and aggregates.
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Install Rust 1.87
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master@2026-05-27
        with:
          toolchain: "1.87"
          targets: ${{ matrix.target }}

      # No Swatinem/rust-cache in release builds — see Linux job above.

      - name: Install Node (for Tauri CLI)
        # zizmor: ignore[cache-poisoning]
        # setup-node is required to install the Tauri CLI. We pass `cache: ""`
        # so no npm/yarn/pnpm cache is read or written at runtime; zizmor's
        # static rule flags setup-node regardless because the action *can*
        # cache when `cache:` is set to a package-manager string. Suppressed
        # on the explicit `cache: ""` opt-out below.
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 24
          cache: ""

      - name: Install Tauri CLI
        run: npm install -g @tauri-apps/cli@2.11.1

      - name: Build Tauri app
        working-directory: gui
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: tauri build --target ${{ matrix.target }} --bundles dmg

      - name: Compute artifact hashes
        shell: bash
        run: |
          set -euo pipefail
          cd target/${{ matrix.target }}/release/bundle/dmg
          # macOS shasum vs sha256sum: use shasum -a 256 for portability.
          shasum -a 256 *.dmg > hashes-macos-${{ matrix.target }}.txt
          cp hashes-macos-${{ matrix.target }}.txt "$GITHUB_WORKSPACE/"

      - name: Upload hashes (macOS ${{ matrix.target }})
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: hashes-macos-${{ matrix.target }}
          path: hashes-macos-${{ matrix.target }}.txt

      - name: Upload artifacts (macOS ARM)
        if: matrix.target == 'aarch64-apple-darwin'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: zeck-macos-arm
          path: target/aarch64-apple-darwin/release/bundle/dmg/*.dmg

      - name: Upload artifacts (macOS Intel)
        if: matrix.target == 'x86_64-apple-darwin'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: zeck-macos-intel
          path: target/x86_64-apple-darwin/release/bundle/dmg/*.dmg

  build-windows:
    runs-on: windows-latest
    environment: release-sign
    permissions:
      contents: read
      # Required for the OIDC token azure/login exchanges with Entra ID
      # (federated credential subject:
      # repo:sovright/zec-wallet-rescue:environment:release-sign). No signing
      # secret is stored in GitHub — the key lives in Azure Trusted Signing.
      id-token: write
    outputs:
      hashes: ${{ steps.hash.outputs.hashes }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Install Rust 1.87
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master@2026-05-27
        with:
          toolchain: "1.87"

      # No Swatinem/rust-cache in release builds — see Linux job above.

      - name: Install Node (for Tauri CLI)
        # zizmor: ignore[cache-poisoning]
        # setup-node is required to install the Tauri CLI. We pass `cache: ""`
        # so no npm/yarn/pnpm cache is read or written at runtime; zizmor's
        # static rule flags setup-node regardless because the action *can*
        # cache when `cache:` is set to a package-manager string. Suppressed
        # on the explicit `cache: ""` opt-out below.
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 24
          cache: ""

      - name: Install Tauri CLI
        run: npm install -g @tauri-apps/cli@2.11.1

      # Azure Trusted Signing (cloud-held key) via OIDC — no secret in CI.
      # Signs the inner Argos.exe *and* the MSI/NSIS installers during the
      # build (see signCommand injected below), so the hash step that follows
      # — and therefore the SLSA provenance — covers the signed bytes with no
      # reordering. All non-secret parameters come from `release-sign`
      # environment variables; flip AZURE_SIGNING_PROFILE from the test
      # profile to the public-trust profile to cut a trusted release.
      - name: Azure login (OIDC)
        uses: azure/login@a457da9ea143d694b1b9c7c869ebb04ebe844ef5 # v2
        with:
          client-id: ${{ vars.AZURE_SIGNING_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_SIGNING_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SIGNING_SUBSCRIPTION_ID }}

      - name: Set up Trusted Signing (dlib + signtool + signCommand)
        id: ts
        shell: pwsh
        env:
          TS_ENDPOINT: ${{ vars.AZURE_SIGNING_ENDPOINT }}
          TS_ACCOUNT: ${{ vars.AZURE_SIGNING_ACCOUNT }}
          TS_PROFILE: ${{ vars.AZURE_SIGNING_PROFILE }}
        run: |
          $ErrorActionPreference = "Stop"

          # Microsoft's Trusted Signing client (the signtool dlib). Pinned;
          # bump deliberately. The dlib authenticates via DefaultAzureCredential,
          # which picks up the azure/login session above (no secret needed).
          $nugetVersion = "1.0.95"
          $pkgZip = Join-Path $env:RUNNER_TEMP "mtsc.zip"
          $pkgDir = Join-Path $env:RUNNER_TEMP "mtsc"
          Invoke-WebRequest -UseBasicParsing `
            -Uri "https://www.nuget.org/api/v2/package/Microsoft.Trusted.Signing.Client/$nugetVersion" `
            -OutFile $pkgZip
          Expand-Archive -Path $pkgZip -DestinationPath $pkgDir -Force
          $dlib = Join-Path $pkgDir "bin\x64\Azure.CodeSigning.Dlib.dll"
          if (-not (Test-Path $dlib)) {
            $dlib = (Get-ChildItem -Path $pkgDir -Recurse -Filter "Azure.CodeSigning.Dlib.dll" |
                     Select-Object -First 1 -ExpandProperty FullName)
          }
          if (-not $dlib) { throw "Azure.CodeSigning.Dlib.dll not found in package" }

          # Trusted Signing metadata consumed by the dlib.
          $metadata = Join-Path $env:RUNNER_TEMP "ts-metadata.json"
          [ordered]@{
            Endpoint               = $env:TS_ENDPOINT
            CodeSigningAccountName = $env:TS_ACCOUNT
            CertificateProfileName = $env:TS_PROFILE
          } | ConvertTo-Json | Out-File -FilePath $metadata -Encoding utf8

          # signtool from the Windows SDK (present on windows-latest); pick the
          # highest-versioned x64 build.
          $signtool = (Get-ChildItem "C:\Program Files (x86)\Windows Kits\10\bin\*\x64\signtool.exe" |
                       Sort-Object FullName -Descending |
                       Select-Object -First 1 -ExpandProperty FullName)
          if (-not $signtool) { throw "signtool.exe not found in Windows SDK" }

          # Tauri config override: signs each artifact (inner exe + installers)
          # as it is produced. %1 is Tauri's file-path placeholder.
          $signConfig = Join-Path $env:RUNNER_TEMP "sign-config.json"
          @{
            bundle = @{
              windows = @{
                signCommand = @{
                  cmd  = $signtool
                  args = @(
                    "sign", "/v", "/fd", "SHA256",
                    "/tr", "http://timestamp.acs.microsoft.com", "/td", "SHA256",
                    "/dlib", $dlib, "/dmdf", $metadata, "%1"
                  )
                }
              }
            }
          } | ConvertTo-Json -Depth 10 | Out-File -FilePath $signConfig -Encoding utf8

          "sign_config=$signConfig" >> $env:GITHUB_OUTPUT

      - name: Build + sign Tauri app
        working-directory: gui
        run: tauri build --bundles msi --bundles nsis --config "${{ steps.ts.outputs.sign_config }}"

      - name: Compute artifact hashes
        id: hash
        shell: bash
        working-directory: target/release/bundle
        run: |
          set -euo pipefail
          sha256sum msi/*.msi nsis/*.exe > hashes-windows.txt
          echo "hashes=$(base64 -w0 < hashes-windows.txt)" >> "$GITHUB_OUTPUT"

      - name: Upload artifacts (Windows)
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: zeck-windows
          path: |
            target/release/bundle/msi/*.msi
            target/release/bundle/nsis/*.exe

  combine-hashes:
    # Aggregates per-platform artifact hashes into a single base64-subjects
    # blob for the SLSA generic generator. Required because macOS's matrix
    # produces two separate jobs whose outputs cannot both be observed at the
    # consumer side; the matrix uploads `hashes-macos-<target>` artifacts
    # which we download here.
    needs: [build-linux, build-macos, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      hashes: ${{ steps.combine.outputs.hashes }}
    steps:
      - name: Download macOS hash artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          pattern: hashes-macos-*
          path: macos-hashes
          merge-multiple: true

      - id: combine
        shell: bash
        run: |
          set -euo pipefail
          # Concatenate per-platform "<sha>  <filename>" lines, then base64-
          # encode the whole list. The SLSA generic generator decodes once
          # and produces one in-toto subject per line.
          {
            echo "${{ needs.build-linux.outputs.hashes }}" | base64 -d
            cat macos-hashes/hashes-macos-*.txt
            echo "${{ needs.build-windows.outputs.hashes }}" | base64 -d
          } > combined-hashes.txt
          echo "hashes=$(base64 -w0 < combined-hashes.txt)" >> "$GITHUB_OUTPUT"

  provenance:
    # SLSA Level 3 provenance attestation over every release artifact.
    # Closes T-SC6 (THREAT_MODEL.md §6.6): a downloader can verify that the
    # exact bytes they hold were produced by this workflow at this tag from
    # this commit, by running:
    #     slsa-verifier verify-artifact <file> \
    #         --provenance-path argos-<tag>.intoto.jsonl \
    #         --source-uri github.com/sovright/zec-wallet-rescue \
    #         --source-tag <tag>
    # The reusable workflow is SHA-pinned per T-SC10. `upload-assets: false`
    # so the provenance is uploaded as a workflow artifact; the `release` job
    # below adds it to the release alongside the binaries.
    needs: [combine-hashes]
    permissions:
      actions: read
      contents: write
      id-token: write
    uses: slsa-framework/slsa-github-generator/.github/workflows/generator_generic_slsa3.yml@f7dd8c54c2067bafc12ca7a55595d5ee9b75204a # v2.1.0
    with:
      base64-subjects: ${{ needs.combine-hashes.outputs.hashes }}
      upload-assets: false
      provenance-name: argos-${{ github.ref_name }}.intoto.jsonl

  release:
    needs: [build-linux, build-macos, build-windows, provenance]
    runs-on: ubuntu-latest
    environment: release-publish
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Download binary artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          # Match only the binary-bundle artifacts; the per-platform
          # `hashes-*` artifacts and the provenance artifact are downloaded
          # separately below to keep the SHA256SUMS step from re-hashing
          # them.
          pattern: zeck-*
          path: artifacts
          merge-multiple: false

      - name: Download provenance attestation
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: ${{ needs.provenance.outputs.provenance-name }}
          path: artifacts/provenance

      - name: Generate SHA256SUMS manifest
        working-directory: artifacts
        run: |
          find . -type f ! -name SHA256SUMS ! -name '*.intoto.jsonl' -print0 \
            | xargs -0 sha256sum \
            | sort \
            | tee SHA256SUMS

      - name: Create GitHub Release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          files: |
            artifacts/**/*
          generate_release_notes: true
          draft: true
