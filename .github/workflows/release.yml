name: release

on:
  push:
    tags:
      - "v*"

jobs:
  build-linux:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust 1.87
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.87"

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: ". -> target"

      - name: Install Linux system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install Node (for Tauri CLI)
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install Tauri CLI
        run: npm install -g @tauri-apps/cli@2.11.1

      - name: Build Tauri app
        working-directory: gui
        run: tauri build --bundles deb --bundles appimage

      - name: Upload artifacts (Linux)
        uses: actions/upload-artifact@v4
        with:
          name: zeck-linux
          path: |
            target/release/bundle/deb/*.deb
            target/release/bundle/appimage/*.AppImage

  build-macos:
    strategy:
      fail-fast: false
      matrix:
        target: [aarch64-apple-darwin, x86_64-apple-darwin]
    runs-on: macos-latest
    environment: release-sign
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust 1.87
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.87"
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: ". -> target"

      - name: Install Node (for Tauri CLI)
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install Tauri CLI
        run: npm install -g @tauri-apps/cli@2.11.1

      - name: Build Tauri app
        working-directory: gui
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: tauri build --target ${{ matrix.target }} --bundles dmg

      - name: Upload artifacts (macOS ARM)
        if: matrix.target == 'aarch64-apple-darwin'
        uses: actions/upload-artifact@v4
        with:
          name: zeck-macos-arm
          path: target/aarch64-apple-darwin/release/bundle/dmg/*.dmg

      - name: Upload artifacts (macOS Intel)
        if: matrix.target == 'x86_64-apple-darwin'
        uses: actions/upload-artifact@v4
        with:
          name: zeck-macos-intel
          path: target/x86_64-apple-darwin/release/bundle/dmg/*.dmg

  build-windows:
    runs-on: windows-latest
    environment: release-sign
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust 1.87
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.87"

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: ". -> target"

      - name: Install Node (for Tauri CLI)
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install Tauri CLI
        run: npm install -g @tauri-apps/cli@2.11.1

      - name: Build Tauri app
        working-directory: gui
        run: tauri build --bundles msi --bundles nsis

      - name: Upload artifacts (Windows)
        uses: actions/upload-artifact@v4
        with:
          name: zeck-windows
          path: |
            target/release/bundle/msi/*.msi
            target/release/bundle/nsis/*.exe

  release:
    needs: [build-linux, build-macos, build-windows]
    runs-on: ubuntu-latest
    environment: release-publish
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Generate SHA256SUMS manifest
        working-directory: artifacts
        run: |
          find . -type f ! -name SHA256SUMS -print0 \
            | xargs -0 sha256sum \
            | sort \
            | tee SHA256SUMS

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          generate_release_notes: true
          draft: true
