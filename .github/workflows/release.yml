name: release

on:
  push:
    tags:
      - "v*"

# Least-privilege default: every job opts in explicitly. Only the publish
# job needs `contents: write` (to create the GitHub Release). Mitigates
# third-party Action token-exfiltration risk (THREAT_MODEL.md §6.6 T-SC3).
permissions: {}

jobs:
  build-linux:
    runs-on: ubuntu-22.04
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Install Rust 1.87
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master@2026-05-27
        with:
          toolchain: "1.87"

      # No Swatinem/rust-cache in release builds: a poisoned cache from a PR
      # run feeding a signed release tag is a worse failure mode than a slow
      # tag build (THREAT_MODEL.md §6.6 T-SC3 / zizmor cache-poisoning).

      - name: Install Linux system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install Node (for Tauri CLI)
        # zizmor: ignore[cache-poisoning]
        # setup-node is required to install the Tauri CLI. We pass `cache: ""`
        # so no npm/yarn/pnpm cache is read or written at runtime; zizmor's
        # static rule flags setup-node regardless because the action *can*
        # cache when `cache:` is set to a package-manager string. Suppressed
        # on the explicit `cache: ""` opt-out below.
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 24
          cache: ""

      - name: Install Tauri CLI
        run: npm install -g @tauri-apps/cli@2.11.1

      - name: Build Tauri app
        working-directory: gui
        run: tauri build --bundles deb --bundles appimage

      - name: Upload artifacts (Linux)
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: zeck-linux
          path: |
            target/release/bundle/deb/*.deb
            target/release/bundle/appimage/*.AppImage

  build-macos:
    strategy:
      fail-fast: false
      matrix:
        target: [aarch64-apple-darwin, x86_64-apple-darwin]
    runs-on: macos-latest
    environment: release-sign
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Install Rust 1.87
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master@2026-05-27
        with:
          toolchain: "1.87"
          targets: ${{ matrix.target }}

      # No Swatinem/rust-cache in release builds — see Linux job above.

      - name: Install Node (for Tauri CLI)
        # zizmor: ignore[cache-poisoning]
        # setup-node is required to install the Tauri CLI. We pass `cache: ""`
        # so no npm/yarn/pnpm cache is read or written at runtime; zizmor's
        # static rule flags setup-node regardless because the action *can*
        # cache when `cache:` is set to a package-manager string. Suppressed
        # on the explicit `cache: ""` opt-out below.
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 24
          cache: ""

      - name: Install Tauri CLI
        run: npm install -g @tauri-apps/cli@2.11.1

      - name: Build Tauri app
        working-directory: gui
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: tauri build --target ${{ matrix.target }} --bundles dmg

      - name: Upload artifacts (macOS ARM)
        if: matrix.target == 'aarch64-apple-darwin'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: zeck-macos-arm
          path: target/aarch64-apple-darwin/release/bundle/dmg/*.dmg

      - name: Upload artifacts (macOS Intel)
        if: matrix.target == 'x86_64-apple-darwin'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: zeck-macos-intel
          path: target/x86_64-apple-darwin/release/bundle/dmg/*.dmg

  build-windows:
    runs-on: windows-latest
    environment: release-sign
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Install Rust 1.87
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master@2026-05-27
        with:
          toolchain: "1.87"

      # No Swatinem/rust-cache in release builds — see Linux job above.

      - name: Install Node (for Tauri CLI)
        # zizmor: ignore[cache-poisoning]
        # setup-node is required to install the Tauri CLI. We pass `cache: ""`
        # so no npm/yarn/pnpm cache is read or written at runtime; zizmor's
        # static rule flags setup-node regardless because the action *can*
        # cache when `cache:` is set to a package-manager string. Suppressed
        # on the explicit `cache: ""` opt-out below.
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 24
          cache: ""

      - name: Install Tauri CLI
        run: npm install -g @tauri-apps/cli@2.11.1

      - name: Build Tauri app
        working-directory: gui
        run: tauri build --bundles msi --bundles nsis

      - name: Upload artifacts (Windows)
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: zeck-windows
          path: |
            target/release/bundle/msi/*.msi
            target/release/bundle/nsis/*.exe

  release:
    needs: [build-linux, build-macos, build-windows]
    runs-on: ubuntu-latest
    environment: release-publish
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Download all artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          path: artifacts

      - name: Generate SHA256SUMS manifest
        working-directory: artifacts
        run: |
          find . -type f ! -name SHA256SUMS -print0 \
            | xargs -0 sha256sum \
            | sort \
            | tee SHA256SUMS

      - name: Create GitHub Release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          files: artifacts/**/*
          generate_release_notes: true
          draft: true
