name: ci

on:
  push:
  pull_request:

jobs:
  check:
    name: Cargo check & clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust 1.87
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.87"
          components: clippy

      - uses: Swatinem/rust-cache@v2

      - name: Install Tauri system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: cargo check
        run: cargo check --workspace

      - name: cargo clippy
        run: cargo clippy --workspace -- -D warnings

  check-windows:
    name: Cargo check (Windows ${{ matrix.label }})
    runs-on: windows-latest
    strategy:
      matrix:
        include:
          - label: x64
            target: x86_64-pc-windows-msvc
          - label: ARM64
            target: aarch64-pc-windows-msvc
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust 1.87
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.87"
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2

      - name: cargo check (workspace)
        run: cargo check --workspace --target ${{ matrix.target }}

  test:
    name: Cargo test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust 1.87
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.87"

      - uses: Swatinem/rust-cache@v2

      - name: Install Tauri system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: cargo test
        run: cargo test --workspace

  audit:
    name: Cargo audit (advisories)
    runs-on: ubuntu-latest
    # rustsec/audit-check posts results as a check-run; without checks:write the
    # GITHUB_TOKEN is read-only on push events and the action fails with
    # "Resource not accessible by integration" even when no vulnerabilities exist.
    permissions:
      checks: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: rustsec/audit-check@v2.0.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
