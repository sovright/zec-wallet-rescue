# lightwalletd configuration for the Argos regtest harness.
#
# Pointed at the zcashd-regtest container's RPC port over the docker
# user-defined network. The `--no-tls-very-insecure` flag is added on the
# command line in docker-compose.yml; this YAML only carries the gRPC bind
# and the zcashd RPC connection details.

grpc-bind-addr: "0.0.0.0:9067"

zcashd:
  host: "zcashd-regtest"
  port: 18232
  user: "argos-regtest"
  password: "argos-regtest"

log-level: 4
