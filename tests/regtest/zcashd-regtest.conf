# zcashd configuration for the Argos regtest harness.
#
# Regtest is an isolated network where the miner can produce blocks on demand.
# Used by tests/regtest/setup.sh to mine the initial 200-block coinbase
# maturity buffer and fund the Argos test seed.
#
# NEVER USE THESE CREDENTIALS ON ANY NETWORK OTHER THAN A SANDBOXED LOCAL
# REGTEST.  The rpcuser/rpcpassword pair is deliberately well-known so the
# harness scripts and CI fixtures don't need a secret store; an exposed
# regtest port with these credentials is a fully-controllable Zcash miner.

regtest=1

# RPC server — loopback only, well-known credentials. docker-compose.yml
# binds the port to 127.0.0.1 explicitly; do not change that.
server=1
rpcuser=argos-regtest
rpcpassword=argos-regtest
rpcbind=0.0.0.0
rpcallowip=0.0.0.0/0
rpcport=18232

# Required for lightwalletd to consume compact blocks.
txindex=1
insightexplorer=1
lightwalletd=1

# Disable network upgrades sent over the wire — regtest activates them
# locally at well-known heights.
listen=0
discover=0
disablesafemode=1

# Activate the modern network upgrades early so tests can exercise the same
# code paths Argos uses on mainnet (Orchard, NU5, etc.). Heights chosen so
# they activate well before the harness mines the funding block at height ~200.
nuparams=blossom:1
nuparams=heartwood:1
nuparams=canopy:1
nuparams=nu5:1
nuparams=nu6:1
