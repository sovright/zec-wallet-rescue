# Argos cargo-audit configuration.
#
# CI runs `cargo audit` on every push and PR (T-B1 in docs/THREAT_MODEL.md).
# Entries below are advisories we have evaluated and chosen to track instead
# of fail CI on. Revisit on every dependency bump. Anything not listed here
# is treated as a hard CI failure.

[advisories]
ignore = [
    # `time` 0.3.x DoS via stack exhaustion when parsing untrusted input.
    # Pinned transitively by `zcash_client_backend` (rusqlite + tauri/cookie).
    # Argos is a single-use desktop recovery tool; time values come from
    # lightwalletd (TLS-pinned) and the local SQLite DB, not arbitrary
    # attacker-controlled input. Upgrading requires bumping zcash deps; track
    # for the next zcash_client_backend bump.
    "RUSTSEC-2026-0009",

    # `rand` 0.10.0 unsoundness when used with a custom global logger.
    # Pulled in via `bip0039`. We do not install a custom logger that interferes
    # with `rand::rng()` and the affected call pattern is not used in Argos.
    "RUSTSEC-2026-0097",

    # Unmaintained crates pulled in transitively through Tauri's GTK3 stack
    # on Linux. No fixes available upstream; would require Tauri itself to
    # migrate to GTK4. Track upstream rather than block CI on them.
    "RUSTSEC-2024-0411",  # gdkwayland-sys (gtk-rs GTK3)
    "RUSTSEC-2024-0412",  # gdk (gtk-rs GTK3)
    "RUSTSEC-2024-0413",  # atk
    "RUSTSEC-2024-0414",  # gtk-rs GTK3
    "RUSTSEC-2024-0415",  # gtk-rs GTK3
    "RUSTSEC-2024-0416",  # atk-sys
    "RUSTSEC-2024-0417",  # gdkx11
    "RUSTSEC-2024-0418",  # gdk-sys
    "RUSTSEC-2024-0419",  # gtk-rs GTK3
    "RUSTSEC-2024-0420",  # gtk-rs GTK3
    "RUSTSEC-2024-0429",  # gtk-rs GTK3
    "RUSTSEC-2025-0080",  # gtk-rs GTK3
    "RUSTSEC-2025-0081",  # gtk-rs GTK3

    # Other unmaintained / yanked transitive dependencies with no upstream fix.
    "RUSTSEC-2024-0370",  # proc-macro-error unmaintained (via syn macros)
    "RUSTSEC-2025-0057",  # fxhash unmaintained (transitive)
    "RUSTSEC-2025-0075",  # unic-char-property et al. unmaintained
    "RUSTSEC-2025-0098",  # unic-* unmaintained
    "RUSTSEC-2025-0100",  # glib VariantStrIter unsoundness (Tauri stack)
    "RUSTSEC-2026-0105",  # core2 yanked (transitive)
]
